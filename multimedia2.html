<!DOCTYPE html>
<html>
<head>
    <title>Multimedia Tags</title>
</head>
<body>
    <h3>Image tag</h3>
    <img src="wall.jpg" alt="the nature" width="300">
    <h3>Video tag</h3>
    <video src="4 Second Timer _ Basic.mp4" width="300" controls type="video/mp4">
        <!-- <source src="video.mp4" type="video/mp4"> -->
    </video>
    <h3>Audio Tag</h3>
    <audio width="300" controls>
        <source src="aud.mp3" type="audio/mp3">
    </audio>
    <h3>Iframe tag</h3>
    <iframe src="https://www.youtube.com/embed/3eSKo66Um9k?si=9_SUEnW3ks6CGDJf" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
</body>
</html>
