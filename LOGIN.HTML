<!DOCTYPE html>
<html>
<head>
<style>
body{
  background:rgb(165, 204, 9);
  font-family:Arial;
}
.login{
  width:300px;
  margin:100px auto;
  padding:20px;
  background:#eee;
  text-align:center;
  border-radius:10px;
}
input,button{
  width:90%;
  padding:10px;
  margin:10px;
}
button{
  background:blue;
  color:white;
  border:none;
}
</style>
</head>
<body>

<div class="login">
  <h2>Login</h2>
  <input type="text" placeholder="Username"><br>
  <input type="password" placeholder="Password"><br>
  <button>Login</button><br>
  <a href="#">Forgot Password?</a>
</div>

</body>
</html>
