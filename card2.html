<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>card</title>
</head>
<style>
    <body{
        background:#f29696;
                padding:20px;
            }
    .container{
        
    background-color: rgb(212, 158, 185);
            width: 1000px;
            height: 300px;
    
            margin: 20px;
                     
        

    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:12px;
    padding: 25px;
    border-radius:12px;

        
    }

    .card{
        width: 225px;
        overflow: hidden;
        border-width: 3px;
        border-radius: 30px;
        background-color: #ffffff;
        
    
    }
    .card img{
        width: 130px;;
        height: 190px;
        padding: 25px;
    
        margin-left: 20px;
        
    }
    .title{
        text-align: left;
        font-size: x-large;
        font-weight: 900;
        font-variant: small-caps;
        margin-left: 5px;

        
        
    }
    
    
</style>
<body>
    
    <div class="container">
        <div class="card" >
            <img src="download.jpeg" alt="buds"  >
            <div class=" title" style="font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif; "  >airbuds
            </div>
        </div>
    

    
        <div class="card">
            <img src="download (2).jpeg" alt="laptop">
             <div class="title" style="font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;"> Laptop
             </div>
        </div>
     

        
            <div class="card">
                <img src="download (1).jpeg" alt="camera">
                 <div class=" title" style="font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;">camera
                </div>
            </div>
        
      
        <div class="card">
            <img src="shopping.webp" alt="phone">
            <div class="title" style="font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;" >iphon 17 pro</div>
        </div>
     </div>  
    
    
</body>
</html>
